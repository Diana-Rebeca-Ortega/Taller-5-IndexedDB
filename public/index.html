<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Mi base de datos local</h1>
    <button onclick = "conectarDB()">Conectar a Indexed DB </button>
     <button onclick = "guardarUsuario()">Registro</button>

      <button onclick = "consultar()">Cragar Tabla de USuarios  </button>

<br> <br>

<table border="1">
    <thead>
        <tr>
            <th>ID
            </th>
            <th>Nombre</th>
             <th>Sexo</th>
              <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="cuerpo-tabla">

    </tbody>
</table>


<script>
    //db global
    let db;
    function conectarDB(){
        const req = indexedDB.open("MangoBD", 1)
        req.onsuccess = (e) => {
            db = e.target.result;
            alert("Base de datos conectada en el mavegador ");
        };

        req.onupgradeneeded = (e) => {
            const dbUpgrade = e.target.result;

            if(!dbUpgrade.objectStoreNames.contains("usuarios")){
                dbUpgrade.createObjectStore("usuarios", {keyPath: "id"});
                console.log ("Almacen 'usuarios' creado");
            }
        };

        req.onerror = (e) => {
            console.error ("ERROR al abrir la BD:", e.target.error);
        };
    }

    function guardarUsuario(){
        if (!db){
            alert("Error: Primero debes hacer click en 'Conectar a indexed bD'");
            return;
        }
        try{
            const transaccion = db.transaccion(["usuarios"], "readwrite");
            const almacen = transaccion.objectStore("usuarios");

            const nuevoUsuario ={
                id: Date.now(),
                nombre: "EL MANGO",
                sexo: "M",
                tema: "oscuro",
                fecha_registro: "2026-05-05"
            };

            const peticion = almacen.add(nuevoUsuario);

            peticion.onsuccess = () =>{
                console.log("Usuario guardado con sus preferencias");
                alert("!Usuario registrado exitosamente");
            };
            peticion.onerror = (e) => {
                console.error("Error al guardar:", e.target.error);
            };


        }catch(error){
            console.error("Error en la transaccion:", error);
        }
    }

    function consultar(){
        const tabla = document.getElementById("cuerpo-tabla");
        tabla.innerHTML = "";

        const transaccion = db.transaccion(["usuarios"], "readonly");
        const almacen = transaccion.objectStore("usuarios");
        const cursorRequest = almacen.openCursor();

        cursorRequest.onsuccess = (e) =>{
            const cursor = e.target.result;

            if(cursor){
                const u = cursor.value;
                tabla.innerHTML += `  
                <tr>

                    <td> ${u.id} </td>
                    <td> ${u.nombre} </td>
                    <td> ${u.sexo} </td>
                    <td>
                        <button onclick = "eliminarRegistro(${u.id})">Eliminar 
                         </button >   
                        </td>
                </tr>
            `;
                cursor.continue();

            }
        };
    }

    function eliminarRegistro(idABorrar){
        if (!config("Seguro que quieres borrar el ID"+ idABorrar + "?"))return;

        const transaccion = db.transaccion([usuarios], "readwrite");
        const almacen = transaccion.objectStore("usuarios");

        const peticion = almacen.delete(idABorrar);

        peticion.onsuccess = () => {
            alert("Registro "+ idABorrar + " elimado.");
            consultar();
        };

        peticion.onerror = () =>{
            console.error("No se pudo eliminar");
        };
    }

</script>




    </body>
</html>
